name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: psl
          POSTGRES_PASSWORD: psl
          POSTGRES_DB: psl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://psl:psl@localhost:5432/psl_test
      TEST_REDIS_URL: redis://localhost:6379/1
      DATABASE_URL: postgresql+asyncpg://psl:psl@localhost:5432/psl_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-secret
      CSRF_SECRET: ci-csrf
      ENV: local

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --frozen || uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest -q
